[shelly]
zulauf_base_url = http://SHELLY_ZULAUF_IP
ablauf_base_url = http://SHELLY_ABWASSER_IP
input_id = 2
request_timeout_seconds = 8

[sensor]
model = FL-S402B
# Aufdruck am Sensor: F = 23 * Q(L/min) -> 23*60 = 1380 pulse/L
pulses_per_liter = 1380
target_expression = x/1380
target_unit = Liter

[whatsapp]
base_url = https://your-waha.example.com/api
api_key = CHANGE_ME
empfaenger = CHANGE_ME@g.us
session = default
send_endpoint = /sendText
retries = 3
retry_delay_seconds = 2
privacy_mode = true

[report]
daily_send_time = 06:00
state_file = osmose_state.json